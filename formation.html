<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frais de formation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <div class="top-bar">
      <a href="index.html" class="back-link">← Accueil</a>
      <h1 class="page-title center-title">Frais de formation</h1>
    </div>

    <section class="card">
      <h2>Informations générales</h2>

      <div class="grid grid-2">
        <div class="field">
          <label for="moisFormation">Mois de l'état de frais</label>
          <input type="month" id="moisFormation" />
        </div>

        <div class="field">
          <label for="assistantNomFormation">Nom et prénom de l'assistant familial</label>
          <input type="text" id="assistantNomFormation" placeholder="Ex. David Martin" />
        </div>
      </div>
    </section>

    <section class="card">
      <h2>Ajouter une dépense de formation</h2>

      <div class="grid grid-2">
        <div class="field">
          <label for="dateFormation">Date</label>
          <input type="date" id="dateFormation" />
        </div>

        <div class="field">
          <label for="organismeFormation">Organisme / lieu</label>
          <input type="text" id="organismeFormation" placeholder="Ex. CNFPT, centre de formation..." />
        </div>

        <div class="field">
          <label for="typeFormation">Type de frais</label>
          <select id="typeFormation">
            <option value="">Choisir</option>
            <option value="Inscription">Inscription</option>
            <option value="Repas">Repas</option>
            <option value="Transport">Transport</option>
            <option value="Hébergement">Hébergement</option>
            <option value="Matériel">Matériel</option>
            <option value="Documentation">Documentation</option>
            <option value="Autre">Autre</option>
          </select>
        </div>

        <div class="field">
          <label for="lieuFormation">Lieu</label>
          <input type="text" id="lieuFormation" placeholder="Ex. Rouen, Le Havre..." />
        </div>

        <div class="field">
          <label for="objetFormation">Objet / description</label>
          <input type="text" id="objetFormation" placeholder="Ex. Journée de formation, repas du midi..." />
        </div>

        <div class="field">
          <label for="montantFormation">Montant (€)</label>
          <input type="number" id="montantFormation" step="0.01" min="0" placeholder="Ex. 12.50" />
        </div>

        <div class="field">
          <label for="justificatifFormation">Justificatif (PDF ou photo)</label>

          <input
  type="file"
  id="justificatifFormation"
  accept=".jpg,.jpeg,.png,image/*"
  capture="environment"
  style="display:none;"
/>

<label for="justificatifFormation" class="btn btn-secondary" id="btnPhotoFormation">
  📷 Ajouter photo ou facture
</label>

          <small id="nomJustificatifFormation" class="saved-msg"></small>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-success" type="button" id="btnAjouterFormation">Ajouter la dépense</button>
        <button class="btn btn-secondary" type="button" id="btnResetFormation">Réinitialiser</button>
      </div>
    </section>

    <section class="card">
      <h2>Liste des frais de formation</h2>

      <div class="table-wrap">
        <table class="deplacements-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Type</th>
              <th>Organisme / lieu</th>
              <th>Lieu</th>
              <th>Objet</th>
              <th>Montant</th>
              <th>Justificatif</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="formationBody">
            <tr>
              <td colspan="8" class="empty-cell">Aucune dépense enregistrée</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="monthly-summary">
        <div class="summary-box">
          <span>Nombre de dépenses</span>
          <strong id="totalLignesFormation">0</strong>
        </div>
        <div class="summary-box">
          <span>Total du mois</span>
          <strong id="totalMontantFormation">0,00 €</strong>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-success" type="button" id="btnPdfFormation">Générer PDF mensuel</button>
        <button class="btn btn-danger" type="button" id="btnViderFormation">Vider la liste</button>
      </div>
    </section>
  </div>

  <div id="toastFormation" class="toast">Action effectuée avec succès</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script type="module" src="formation.js"></script>
</body>
</html>
