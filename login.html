<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion AssistKM</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f3f6fb, #e7edf7);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      width: 100%;
      max-width: 430px;
      background: #ffffff;
      border-radius: 22px;
      padding: 28px;
      box-shadow: 0 14px 35px rgba(15, 23, 42, 0.08);
    }

    .login-card h1 {
      margin: 0 0 8px 0;
      text-align: center;
      color: #111827;
      font-size: 30px;
    }

    .subtitle {
      text-align: center;
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
      color: #374151;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 14px;
      outline: none;
      transition: 0.2s;
    }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 8px;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .btn-secondary {
      background: #111827;
      color: white;
    }

    .btn-secondary:hover {
      background: #1f2937;
    }

    .message {
      margin-top: 16px;
      min-height: 20px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
    }

    .message.error {
      color: #dc2626;
    }

    .message.success {
      color: #059669;
    }

    .loading {
      opacity: 0.7;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>AssistKM</h1>
    <div class="subtitle">Connexion et création de compte</div>

    <div class="form-group">
      <label for="email">Adresse mail</label>
      <input type="email" id="email" placeholder="exemple@email.com" />
    </div>

    <div class="form-group">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" placeholder="Mot de passe" />
    </div>

    <button id="loginBtn" class="btn btn-primary">Se connecter</button>
    <button id="registerBtn" class="btn btn-secondary">Créer un compte</button>

    <div id="message" class="message"></div>
  </div>

  <script type="module" src="login.js"></script>
</body>
</html>
