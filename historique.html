<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Historique</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <a href="index.html" class="back-link">← Accueil</a>
      <h1 class="page-title center-title">Historique</h1>
    </div>

    <section class="card">
      <h2>Filtres</h2>

      <div class="grid grid-3">
        <div class="field">
          <label for="filtreType">Type de document</label>
          <select id="filtreType">
            <option value="">Tous</option>
            <option value="Frais kilométriques">Frais kilométriques</option>
            <option value="Frais de parking">Frais de parking</option>
            <option value="Frais de Noël">Frais de Noël</option>
            <option value="Frais scolaires">Frais scolaires</option>
            <option value="Sports et loisirs">Sports et loisirs</option>
            <option value="Autres frais">Autres frais</option>
            <option value="Abattement fiscal">Abattement fiscal</option>
            <option value="Frais formation">Frais formation</option>
          </select>
        </div>

        <div class="field">
          <label for="filtreMois">Mois / année</label>
          <input type="text" id="filtreMois" placeholder="Ex. Mars 2026 ou 2026" />
        </div>

        <div class="field">
          <label for="filtreRecherche">Recherche</label>
          <input type="text" id="filtreRecherche" placeholder="Nom de fichier, type..." />
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-secondary" type="button" id="btnResetFiltres">
          Réinitialiser les filtres
        </button>
      </div>
    </section>

    <section class="card">
      <h2>PDF enregistrés</h2>

      <div class="monthly-summary">
        <div class="summary-box">
          <span>Nombre de résultats</span>
          <strong id="nbResultatsHistorique">0</strong>
        </div>
      </div>

      <div class="table-wrap">
        <table class="deplacements-table">
          <thead>
            <tr>
              <th>Mois</th>
              <th>Type</th>
              <th>Nom du fichier</th>
              <th>Date de génération</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="historiqueBody">
            <tr>
              <td colspan="5" class="empty-cell">Aucun PDF enregistré</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="historique.js"></script>
</body>
</html>
