<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Historique PDF</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #f8fafc;
      min-height: 100vh;
      padding: 20px;
    }

    .page {
      max-width: 1300px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .title-block h1 {
      font-size: 28px;
      margin-bottom: 6px;
    }

    .title-block p {
      color: #cbd5e1;
      font-size: 14px;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .btn-home {
      background: #334155;
      color: white;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-secondary {
      background: #475569;
      color: white;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
      margin-bottom: 18px;
    }

    .filters-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 15px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 13px;
      font-weight: 700;
      color: #e2e8f0;
    }

    .field input,
    .field select {
      width: 100%;
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.10);
      color: white;
      font-size: 14px;
      outline: none;
    }

    .field input::placeholder {
      color: #cbd5e1;
    }

    .field select option {
      color: #111827;
      background: white;
    }

    .filters-actions,
    .history-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .stats {
      margin-top: 12px;
      color: #cbd5e1;
      font-size: 14px;
      font-weight: 600;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
      border-radius: 16px;
    }

    table {
      width: 100%;
      min-width: 900px;
      border-collapse: collapse;
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      overflow: hidden;
    }

    thead {
      background: rgba(255,255,255,0.10);
    }

    th, td {
      padding: 14px 12px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      vertical-align: middle;
      font-size: 14px;
    }

    th {
      color: #f8fafc;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    tbody tr:hover {
      background: rgba(255,255,255,0.05);
    }

    .empty-cell {
      text-align: center;
      color: #cbd5e1;
      padding: 24px;
      font-style: italic;
    }

    .table-action-btn {
      border: none;
      border-radius: 10px;
      padding: 8px 12px;
      color: white;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
      background: #dc2626;
    }

    .table-action-btn:hover {
      opacity: 0.92;
    }

    .checkbox-cell {
      text-align: center;
    }

    .checkbox-cell input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      body {
        padding: 14px;
      }

      .title-block h1 {
        font-size: 22px;
      }

      .btn {
        width: 100%;
      }

      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .filters-actions,
      .history-actions {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="topbar">
      <div class="title-block">
        <h1>Historique PDF</h1>
        <p>Retrouve tous tes PDF générés, sélectionne-les et fusionne-les en un seul document.</p>
      </div>

      <a href="index.html" class="btn btn-home">← Retour à l'accueil</a>
    </div>

    <div class="card">
      <div class="filters-grid">
        <div class="field">
          <label for="filtreType">Type de document</label>
          <select id="filtreType">
            <option value="">Tous les types</option>
            <option value="Frais kilométriques">Frais kilométriques</option>
            <option value="Frais de parking">Frais de parking</option>
            <option value="Habillement">Habillement</option>
            <option value="Abattement">Abattement</option>
            <option value="Formation">Formation</option>
            <option value="Frais de Noël">Frais de Noël</option>
            <option value="Frais scolaires">Frais scolaires</option>
            <option value="Sports et loisirs">Sports et loisirs</option>
            <option value="Autres frais">Autres frais</option>
            <option value="Note de frais">Note de frais</option>
            <option value="Non classé">Non classé</option>
          </select>
        </div>

        <div class="field">
          <label for="filtreMois">Mois / période</label>
          <input type="text" id="filtreMois" placeholder="Ex : mars 2026" />
        </div>

        <div class="field">
          <label for="filtreRecherche">Recherche</label>
          <input type="text" id="filtreRecherche" placeholder="Nom du fichier, type, date..." />
        </div>
      </div>

      <div class="filters-actions">
        <button id="btnResetFiltres" class="btn btn-secondary">Réinitialiser les filtres</button>
      </div>

      <div class="stats">
        Nombre de résultats : <span id="nbResultatsHistorique">0</span>
      </div>
    </div>

    <div class="card">
      <div class="history-actions" style="margin-bottom: 14px;">
        <button id="btnSelectAllHistorique" class="btn btn-secondary">Tout cocher</button>
        <button id="btnUnselectAllHistorique" class="btn btn-secondary">Tout décocher</button>
        <button id="btnMergeSelected" class="btn btn-primary">Fusionner la sélection</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width: 90px; text-align:center;">Sélection</th>
              <th>Mois</th>
              <th>Type</th>
              <th>Nom du fichier</th>
              <th>Date de génération</th>
              <th style="width: 220px;">Actions</th>
            </tr>
          </thead>
          <tbody id="historiqueBody">
            <tr>
              <td colspan="6" class="empty-cell">Chargement...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- PDF-Lib pour fusionner plusieurs PDF -->
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

  <!-- Ton script historique -->
  <script type="module" src="historique.js"></script>
</body>
</html>
