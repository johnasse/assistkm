<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frais de parking</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <div class="top-bar">
      <a href="index.html" class="back-link">← Accueil</a>
      <h1 class="page-title center-title">Frais de parking</h1>
    </div>

    <section class="card">
      <h2>Informations générales</h2>

      <div class="grid grid-2">
        <div class="field">
          <label for="moisParking">Mois de l'état de frais</label>
          <input type="month" id="moisParking" />
        </div>

        <div class="field">
          <label for="assistantNomParking">Nom et prénom de l'assistant familial</label>
          <input type="text" id="assistantNomParking" placeholder="Ex. David Martin" />
        </div>
      </div>
    </section>

    <section class="card">
      <h2>Ajouter une dépense de parking</h2>

      <div class="grid grid-2">
        <div class="field">
          <label for="dateParking">Date</label>
          <input type="date" id="dateParking" />
        </div>

        <div class="field">
          <label for="enfantParking">Nom de l’enfant</label>
          <input type="text" id="enfantParking" placeholder="Ex. Rudy" />
        </div>

        <div class="field">
          <label for="typeParking">Type de frais</label>
          <select id="typeParking">
            <option value="">Choisir</option>
            <option value="Parking">Parking</option>
            <option value="Stationnement">Stationnement</option>
            <option value="Horodateur">Horodateur</option>
            <option value="Parking hôpital">Parking hôpital</option>
            <option value="Parking tribunal">Parking tribunal</option>
            <option value="Autre">Autre</option>
          </select>
        </div>

        <div class="field">
          <label for="lieuParking">Lieu</label>
          <input type="text" id="lieuParking" placeholder="Ex. Hôpital, centre-ville, tribunal..." />
        </div>

        <div class="field">
          <label for="objetParking">Objet / description</label>
          <input type="text" id="objetParking" placeholder="Ex. Rendez-vous médical, audience, visite..." />
        </div>

        <div class="field">
          <label for="montantParking">Montant (€)</label>
          <input type="number" id="montantParking" step="0.01" min="0" placeholder="Ex. 3.50" />
        </div>

        <div class="field">
          <label for="justificatifParking">Justificatif (PDF ou photo)</label>

          <input
            type="file"
            id="justificatifParking"
            accept=".pdf,.jpg,.jpeg,.png,image/*,application/pdf"
            capture="environment"
            hidden
          />

          <button type="button" class="btn btn-secondary" id="btnPhotoParking">
            📷 Ajouter photo ou facture
          </button>

          <small id="nomJustificatifParking" class="saved-msg"></small>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-success" type="button" id="btnAjouterParking">Ajouter la dépense</button>
        <button class="btn btn-secondary" type="button" id="btnResetParking">Réinitialiser</button>
      </div>
    </section>

    <section class="card">
      <h2>Liste des frais de parking</h2>

      <div class="table-wrap">
        <table class="deplacements-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Enfant</th>
              <th>Type</th>
              <th>Lieu</th>
              <th>Objet</th>
              <th>Montant</th>
              <th>Justificatif</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="parkingBody">
            <tr>
              <td colspan="8" class="empty-cell">Aucune dépense enregistrée</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="monthly-summary">
        <div class="summary-box">
          <span>Nombre de dépenses</span>
          <strong id="totalLignesParking">0</strong>
        </div>
        <div class="summary-box">
          <span>Total du mois</span>
          <strong id="totalMontantParking">0,00 €</strong>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-success" type="button" id="btnPdfParking">Générer PDF mensuel</button>
        <button class="btn btn-danger" type="button" id="btnViderParking">Vider la liste</button>
      </div>
    </section>
  </div>

  <div id="toastParking" class="toast">Action effectuée avec succès</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script type="module" src="parking.js"></script>
</body>
</html>
