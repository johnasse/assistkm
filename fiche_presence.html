<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fiche de présence - EasyFrais</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f3f6fb;
  margin: 0;
  padding: 20px;
}
table {
  border-collapse: collapse;
  width: 100%;
  margin-top: 20px;
}
th, td {
  border: 1px solid #ddd;
  text-align: center;
  padding: 5px;
  font-size: 12px;
}
.day-cell {
  cursor: pointer;
  font-weight: bold;
}
.code-P { background: #dcfce7; }
.code-I { background: #fee2e2; }
.code-DVH { background: #fef3c7; }
.code-A { background: #e0e7ff; }
.code-F { background: #fce7f3; }
.code-R { background: #ede9fe; }

button {
  padding: 8px 12px;
  margin: 5px;
}
</style>
</head>

<body>

<h2>Fiche de présence</h2>

<label>Mois :</label>
<input type="month" id="presenceMonth">

<button onclick="generatePresencePdf()">Générer PDF</button>

<table id="presenceTable"></table>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
let selectedCode = "P";
let daysInMonth = 31;

const state = {
  presence: {
    month: "",
    afName: "",
    rectif: "",
    signatureDataUrl: "",
    children: ["Enfant 1","Enfant 2"],
    grid: [
      Array(31).fill(""),
      Array(31).fill("")
    ]
  }
};

function getDaysInMonth(monthValue) {
  if (!monthValue) return 31;
  const [year, month] = monthValue.split("-").map(Number);
  return new Date(year, month, 0).getDate();
}

document.getElementById("presenceMonth").addEventListener("change", (e) => {
  state.presence.month = e.target.value;
  daysInMonth = getDaysInMonth(state.presence.month);
  renderTable();
});

function renderTable() {
  const table = document.getElementById("presenceTable");

  let html = "<tr><th>Enfant</th>";
  for (let d = 1; d <= daysInMonth; d++) {
    html += "<th>" + d + "</th>";
  }
  html += "<th>Total</th></tr>";

  for (let row = 0; row < state.presence.children.length; row++) {
    html += "<tr>";
    html += "<td>" + state.presence.children[row] + "</td>";

    let total = 0;

    for (let d = 0; d < daysInMonth; d++) {
      const code = state.presence.grid[row][d] || "";
      if (code === "P") total++;

      html += `<td class="day-cell code-${code}" 
        onclick="toggleCell(${row},${d})">${code}</td>`;
    }

    html += "<td><b>" + total + "</b></td>";
    html += "</tr>";
  }

  table.innerHTML = html;
}

function toggleCell(row, day) {
  const current = state.presence.grid[row][day];
  state.presence.grid[row][day] = current === "P" ? "" : "P";
  renderTable();
}

function generatePresencePdf() {
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF("landscape", "mm", "a4");

  const leftMargin = 10;
  const topMargin = 10;
  const dayW = 7;
  const rowH = 8;
  const nameW = 40;
  const totalW = 12;

  const pdfDays = getDaysInMonth(state.presence.month);

  let startX = leftMargin;
  let startY = 20;

  pdf.text("FICHE DE PRESENCE", leftMargin, 10);

  pdf.rect(startX, startY, nameW, rowH);
  pdf.text("ENFANT", startX + 5, startY + 5);

  for (let d = 1; d <= pdfDays; d++) {
    pdf.rect(startX + nameW + (d - 1) * dayW, startY, dayW, rowH);
    pdf.text(String(d), startX + nameW + (d - 1) * dayW + 2, startY + 5);
  }

  pdf.rect(startX + nameW + pdfDays * dayW, startY, totalW, rowH);
  pdf.text("Total", startX + nameW + pdfDays * dayW + 2, startY + 5);

  for (let row = 0; row < state.presence.children.length; row++) {
    const y = startY + rowH * (row + 1);
    pdf.rect(startX, y, nameW, rowH);
    pdf.text(state.presence.children[row], startX + 2, y + 5);

    let total = 0;

    for (let d = 0; d < pdfDays; d++) {
      const code = state.presence.grid[row][d] || "";
      if (code === "P") total++;

      pdf.rect(startX + nameW + d * dayW, y, dayW, rowH);
      pdf.text(code, startX + nameW + d * dayW + 2, y + 5);
    }

    pdf.rect(startX + nameW + pdfDays * dayW, y, totalW, rowH);
    pdf.text(String(total), startX + nameW + pdfDays * dayW + 2, y + 5);
  }

  pdf.save("fiche_presence.pdf");
}

renderTable();
</script>

</body>
</html>
