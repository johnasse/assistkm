<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin test - Easy Frais</title>
  <style>
    * { box-sizing: border-box; font-family: Arial, sans-serif; }
    body { margin: 0; background: #f3f6fb; color: #111827; }

    .page { max-width: 1150px; margin: 0 auto; padding: 24px; }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 22px;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      color: white;
    }

    .btn-home { background: #2563eb; }
    .btn-refresh { background: #16a34a; }

    .card {
      background: white;
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      margin-bottom: 20px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      margin-bottom: 20px;
    }

    .stat-box {
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
    }

    .stat-label { color: #6b7280; font-size: 14px; }
    .stat-value { font-size: 32px; font-weight: 800; }

    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; border-bottom: 1px solid #e5e7eb; }

    .badge {
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .badge-premium { background: #dcfce7; color: #166534; }
    .badge-free { background: #eef2ff; color: #3730a3; }

    pre { font-size: 13px; color: #475569; }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <h1>Admin test</h1>
      <div>
        <a href="index.html" class="btn btn-home">Accueil</a>
        <button id="refreshBtn" class="btn btn-refresh">Actualiser</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-label">Utilisateurs</div>
        <div id="usersCount" class="stat-value">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Abonnés premium</div>
        <div id="premiumCount" class="stat-value">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">PDF générés</div>
        <div id="pdfCount" class="stat-value">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Revenu estimé / mois</div>
        <div id="revenueCount" class="stat-value">0 €</div>
      </div>
    </div>

    <div class="card">
      <h2>Utilisateurs</h2>
      <table>
        <thead>
          <tr>
            <th>UID</th>
            <th>Statut</th>
            <th>PDF</th>
          </tr>
        </thead>
        <tbody id="usersTableBody">
          <tr><td colspan="3">Chargement...</td></tr>
        </tbody>
      </table>
    </div>

    <div class="card">
      <h2>Debug</h2>
      <pre id="debugOutput">En attente…</pre>
    </div>
  </div>

<script type="module">
import { auth, db } from "./firebase-config.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import {
  collection,
  collectionGroup,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const ADMIN_EMAIL = "john.rombert.76@gmail.com";

const usersCountEl = document.getElementById("usersCount");
const premiumCountEl = document.getElementById("premiumCount");
const pdfCountEl = document.getElementById("pdfCount");
const revenueCountEl = document.getElementById("revenueCount");
const usersTableBody = document.getElementById("usersTableBody");
const debugOutput = document.getElementById("debugOutput");
const refreshBtn = document.getElementById("refreshBtn");

function debug(msg) {
  console.log(msg);
  debugOutput.textContent += msg + "\n";
}

function euro(v) {
  return new Intl.NumberFormat("fr-FR", {
    style: "currency",
    currency: "EUR",
    maximumFractionDigits: 0
  }).format(v);
}

async function loadStats() {
  debugOutput.textContent = "";

  let usersTotal = 0;
  let premiumTotal = 0;
  let pdfTotal = 0;

  try {
    const customersSnap = await getDocs(collection(db, "customers"));
    usersTotal = customersSnap.size;
    debug("Customers : " + usersTotal);

    const subsSnap = await getDocs(collectionGroup(db, "subscriptions"));
    const premiumIds = new Set();

    subsSnap.forEach(docSnap => {
      const data = docSnap.data() || {};
      const status = (data.status || "").toLowerCase();
      if (status === "active" || status === "trialing") {
        const parts = docSnap.ref.path.split("/");
        premiumIds.add(parts[1]);
      }
    });

    premiumTotal = premiumIds.size;
    debug("Premium : " + premiumTotal);

    const usageSnap = await getDocs(collectionGroup(db, "usage"));
    const pdfByUser = {};

    usageSnap.forEach(docSnap => {
      const data = docSnap.data() || {};
      const parts = docSnap.ref.path.split("/");
      const userId = parts[1];
      const count = data.pdfCount || data.count || data.total || 1;

      pdfTotal += count;

      if (!pdfByUser[userId]) pdfByUser[userId] = 0;
      pdfByUser[userId] += count;
    });

    usersCountEl.textContent = usersTotal;
    premiumCountEl.textContent = premiumTotal;
    pdfCountEl.textContent = pdfTotal;
    revenueCountEl.textContent = euro(premiumTotal * 2);

    let rows = "";
    customersSnap.forEach(docSnap => {
      const uid = docSnap.id;
      const isPremium = premiumIds.has(uid);
      const pdf = pdfByUser[uid] || 0;

      rows += `
        <tr>
          <td>${uid}</td>
          <td>
            <span class="badge ${isPremium ? "badge-premium" : "badge-free"}">
              ${isPremium ? "Premium" : "Gratuit"}
            </span>
          </td>
          <td>${pdf}</td>
        </tr>
      `;
    });

    usersTableBody.innerHTML = rows || `<tr><td colspan="3">Aucun utilisateur</td></tr>`;

  } catch (e) {
    debug("ERREUR : " + e.message);
  }
}

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "connexion.html";
    return;
  }

  if (user.email !== ADMIN_EMAIL) {
    alert("Accès refusé");
    window.location.href = "index.html";
    return;
  }

  loadStats();
});

refreshBtn.addEventListener("click", loadStats);
</script>
</body>
</html>
