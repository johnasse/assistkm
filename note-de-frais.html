<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Note de frais</title>
  <link rel="stylesheet" href="style.css" />
</head>
<script src="premium.js"></script>
<body>
  <div class="container">
    <nav class="main-nav">
      <a href="index.html">Accueil</a>
      <a href="frais-kilometriques.html">Frais kilométriques</a>
      <a href="note-de-frais.html">Note de frais</a>
      <a href="remboursement-noel.html">Remboursement Noël</a>
      <a href="frais-parking.html">Frais de parking</a>
      <a href="frais-scolaires.html">Frais scolaires</a>
    </nav>

    <section class="card">
      <h1>Note de frais</h1>

      <form class="simple-form">
        <div class="grid">
          <div>
            <label>Nom</label>
            <input type="text" required />
          </div>

          <div>
            <label>Prénom</label>
            <input type="text" required />
          </div>

          <div>
            <label>Date</label>
            <input type="date" required />
          </div>

          <div>
            <label>Montant (€)</label>
            <input type="number" step="0.01" required />
          </div>

          <div class="full">
            <label>Nature de la dépense</label>
            <select required>
              <option value="">Choisir</option>
              <option>Repas</option>
              <option>Transport</option>
              <option>Achats</option>
              <option>Hébergement</option>
              <option>Autre</option>
            </select>
          </div>

          <div class="full">
            <label>Description</label>
            <textarea required></textarea>
          </div>

          <div class="full">
            <label>Justificatif</label>
            <input type="file" />
          </div>
        </div>

        <div class="buttons">
          <button type="submit">Enregistrer</button>
          <button type="button" class="secondary btn-reset">Réinitialiser</button>
        </div>

        <div class="message"></div>
      </form>
    </section>
  </div>

  <script src="app.js"></script>
 <script type="module" src="inactivity.js"></script>
</body>
</html>
