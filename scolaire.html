<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frais scolaires</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <a href="index.html" class="back-link">← Accueil</a>
      <h1 class="page-title center-title">Frais scolaires</h1>
    </div>

    <section class="card">
      <h2>Informations générales</h2>

      <div class="grid grid-2">
        <div class="field">
          <label for="moisScolaire">Mois de l'état de frais</label>
          <input type="month" id="moisScolaire" />
        </div>

        <div class="field">
          <label for="assistantNomScolaire">Nom et prénom de l'assistant familial</label>
          <input type="text" id="assistantNomScolaire" placeholder="Ex. David Martin" />
        </div>
      </div>
    </section>

    <section class="card">
      <h2>Ajouter une dépense scolaire</h2>

      <div class="grid grid-2">
        <div class="field">
          <label for="dateScolaire">Date</label>
          <input type="date" id="dateScolaire" />
        </div>

        <div class="field">
          <label for="enfantScolaire">Nom de l’enfant</label>
          <input type="text" id="enfantScolaire" placeholder="Ex. Rudy" />
        </div>

        <div class="field">
          <label for="typeScolaire">Type de frais</label>
          <select id="typeScolaire">
            <option value="">Choisir</option>
            <option value="Fournitures">Fournitures</option>
            <option value="Cantine">Cantine</option>
            <option value="Sortie scolaire">Sortie scolaire</option>
            <option value="Transport">Transport</option>
            <option value="Vêtements école">Vêtements école</option>
            <option value="Autre">Autre</option>
          </select>
        </div>

        <div class="field">
          <label for="ecoleScolaire">École / établissement</label>
          <input type="text" id="ecoleScolaire" placeholder="Ex. École Jean Lorrain" />
        </div>

        <div class="field">
          <label for="objetScolaire">Objet / description</label>
          <input type="text" id="objetScolaire" placeholder="Ex. Cahiers, stylos, classeur" />
        </div>

        <div class="field">
          <label for="montantScolaire">Montant (€)</label>
          <input type="number" id="montantScolaire" step="0.01" min="0" placeholder="Ex. 18.50" />
        </div>

        <div class="field">
          <label for="justificatifScolaire">Justificatif image</label>

          <input
            type="file"
            id="justificatifScolaire"
            accept=".jpg,.jpeg,.png,image/*"
            capture="environment"
            style="display:none;"
          />

          <label for="justificatifScolaire" class="btn btn-secondary" id="btnPhotoScolaire">
            📷 Ajouter photo ou facture
          </label>

          <small id="nomJustificatifScolaire" class="saved-msg"></small>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-success" type="button" id="btnAjouterScolaire">Ajouter la dépense</button>
        <button class="btn btn-secondary" type="button" id="btnResetScolaire">Réinitialiser</button>
      </div>
    </section>

    <section class="card">
      <h2>Liste des frais scolaires</h2>

      <div class="table-wrap">
        <table class="deplacements-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Enfant</th>
              <th>Type</th>
              <th>École</th>
              <th>Objet</th>
              <th>Montant</th>
              <th>Justificatif</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="scolaireBody">
            <tr>
              <td colspan="8" class="empty-cell">Aucune dépense enregistrée</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="monthly-summary">
        <div class="summary-box">
          <span>Nombre de dépenses</span>
          <strong id="totalLignesScolaire">0</strong>
        </div>
        <div class="summary-box">
          <span>Total du mois</span>
          <strong id="totalMontantScolaire">0,00 €</strong>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-success" type="button" id="btnPdfScolaire">Générer PDF mensuel</button>
        <button class="btn btn-danger" type="button" id="btnViderScolaire">Vider la liste</button>
      </div>
    </section>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script type="module" src="scolaire.js"></script>
</body>
</html>
