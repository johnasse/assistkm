<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AssistKM - Frais de parking</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    .header {
      background: #2563eb;
      color: white;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
    }

    .header h1 {
      margin: 0;
      font-size: 28px;
    }

    .container {
      max-width: 1100px;
      margin: 30px auto;
      padding: 0 16px 30px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 22px;
      margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    .card h2 {
      margin-top: 0;
      font-size: 22px;
      color: #1f2937;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
    }

    .field label {
      font-weight: 700;
      margin-bottom: 6px;
      color: #374151;
    }

    .field input,
    .field select,
    .field textarea {
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 15px;
      outline: none;
      background: #fff;
    }

    .field textarea {
      min-height: 90px;
      resize: vertical;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    button,
    .btn-link {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .btn-success {
      background: #16a34a;
      color: white;
    }

    .btn-success:hover {
      background: #15803d;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .btn-secondary:hover {
      background: #d1d5db;
    }

    .btn-danger {
      background: #dc2626;
      color: white;
    }

    .btn-danger:hover {
      background: #b91c1c;
    }

    .total-box {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 12px;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 18px;
      font-weight: 700;
    }

    .table-wrapper {
      overflow-x: auto;
      margin-top: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    th, td {
      padding: 12px 10px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f9fafb;
      color: #374151;
      font-size: 14px;
    }

    td {
      font-size: 14px;
    }

    .empty {
      color: #6b7280;
      font-style: italic;
      margin-top: 12px;
    }

    .top-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .top-actions-left,
    .top-actions-right {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Frais de parking</h1>
  </div>

  <div class="container">
    <div class="top-actions">
      <div class="top-actions-left">
        <a href="index.html" class="btn-link btn-secondary">Retour accueil</a>
      </div>

      <div class="top-actions-right">
        <button type="button" class="btn-success" onclick="genererPDFParking()">
          Générer PDF
        </button>
      </div>
    </div>

    <div class="card">
      <h2>Informations générales</h2>

      <div class="grid">
        <div class="field">
          <label for="moisParking">Mois</label>
          <input type="month" id="moisParking" />
        </div>

        <div class="field">
          <label for="assistantNomParking">Nom / prénom assistant(e) familial(e)</label>
          <input type="text" id="assistantNomParking" placeholder="Nom et prénom" />
        </div>

        <div class="field">
          <label for="enfantParking">Nom / prénom de l’enfant</label>
          <input type="text" id="enfantParking" placeholder="Nom de l’enfant" />
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Ajouter un frais de parking</h2>

      <div class="grid">
        <div class="field">
          <label for="dateParking">Date</label>
          <input type="date" id="dateParking" />
        </div>

        <div class="field">
          <label for="enfantLigneParking">Enfant</label>
          <input type="text" id="enfantLigneParking" placeholder="Nom de l’enfant" />
        </div>

        <div class="field">
          <label for="lieuParking">Lieu</label>
          <input type="text" id="lieuParking" placeholder="Ex : CHU, tribunal, centre-ville..." />
        </div>

        <div class="field">
          <label for="montantParking">Montant (€)</label>
          <input type="number" id="montantParking" step="0.01" min="0" placeholder="0.00" />
        </div>
      </div>

      <div class="field" style="margin-top: 16px;">
        <label for="motifParking">Motif / détail</label>
        <textarea id="motifParking" placeholder="Exemple : rendez-vous médical, visite, audience..."></textarea>
      </div>

      <div class="actions">
        <button type="button" class="btn-primary" id="btnAjouterParking">
          Ajouter le frais
        </button>
        <button type="button" class="btn-secondary" id="btnViderFormParking">
          Vider le formulaire
        </button>
      </div>
    </div>

    <div class="card">
      <h2>Liste des frais de parking</h2>

      <div id="aucunParking" class="empty">
        Aucun frais enregistré pour le moment.
      </div>

      <div class="table-wrapper">
        <table id="tableParking">
          <thead>
            <tr>
              <th>Date</th>
              <th>Enfant</th>
              <th>Lieu</th>
              <th>Motif / détail</th>
              <th>Montant</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="tbodyParking"></tbody>
        </table>
      </div>

      <div class="total-box" id="totalParking">
        Total : 0,00 €
      </div>

      <div class="actions">
        <button type="button" class="btn-danger" id="btnToutSupprimerParking">
          Tout supprimer
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="history-manager.js"></script>

  <script type="module">
    const STORAGE_KEY = "assistkm_frais_parking";
    let fraisParking = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

    function formatDateFr(dateStr) {
      if (!dateStr) return "-";
      const [year, month, day] = dateStr.split("-");
      return `${day}/${month}/${year}`;
    }

    function formatMonthFr(value) {
      if (!value) return "-";
      const [year, month] = value.split("-");
      const mois = [
        "janvier", "février", "mars", "avril", "mai", "juin",
        "juillet", "août", "septembre", "octobre", "novembre", "décembre"
      ];
      return `${mois[Number(month) - 1]} ${year}`;
    }

    function sauvegarderParking() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(fraisParking));
      window.fraisParking = fraisParking;
    }

    function calculerTotalParking() {
      return fraisParking.reduce((sum, item) => sum + Number(item.montant || 0), 0);
    }

    function mettreAJourTotalParking() {
      const total = calculerTotalParking();
      document.getElementById("totalParking").textContent =
        `Total : ${total.toFixed(2).replace(".", ",")} €`;
    }

    function renderParking() {
      const tbody = document.getElementById("tbodyParking");
      const empty = document.getElementById("aucunParking");

      tbody.innerHTML = "";

      if (fraisParking.length === 0) {
        empty.style.display = "block";
      } else {
        empty.style.display = "none";
      }

      fraisParking.forEach((item, index) => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${formatDateFr(item.date)}</td>
          <td>${item.enfant || "-"}</td>
          <td>${item.lieu || "-"}</td>
          <td>${item.motif || "-"}</td>
          <td>${Number(item.montant).toFixed(2).replace(".", ",")} €</td>
          <td>
            <button type="button" class="btn-danger" data-index="${index}">Supprimer</button>
          </td>
        `;

        tr.querySelector("button").addEventListener("click", () => {
          fraisParking.splice(index, 1);
          sauvegarderParking();
          renderParking();
        });

        tbody.appendChild(tr);
      });

      mettreAJourTotalParking();
    }

    function viderFormulaireParking() {
      document.getElementById("dateParking").value = "";
      document.getElementById("enfantLigneParking").value = "";
      document.getElementById("lieuParking").value = "";
      document.getElementById("motifParking").value = "";
      document.getElementById("montantParking").value = "";
    }

    document.getElementById("btnAjouterParking").addEventListener("click", () => {
      const date = document.getElementById("dateParking").value;
      const enfant = document.getElementById("enfantLigneParking").value.trim();
      const lieu = document.getElementById("lieuParking").value.trim();
      const motif = document.getElementById("motifParking").value.trim();
      const montant = parseFloat(document.getElementById("montantParking").value);

      if (!date || !lieu || !motif || isNaN(montant) || montant <= 0) {
        alert("Merci de remplir les champs obligatoires.");
        return;
      }

      fraisParking.push({
        date,
        enfant,
        lieu,
        motif,
        montant
      });

      sauvegarderParking();
      renderParking();
      viderFormulaireParking();
    });

    document.getElementById("btnViderFormParking").addEventListener("click", viderFormulaireParking);

    document.getElementById("btnToutSupprimerParking").addEventListener("click", () => {
      if (!confirm("Voulez-vous vraiment supprimer tous les frais de parking ?")) return;

      fraisParking = [];
      sauvegarderParking();
      renderParking();
    });

    if (!document.getElementById("moisParking").value) {
      const now = new Date();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      document.getElementById("moisParking").value = `${now.getFullYear()}-${month}`;
    }

    renderParking();

    window.fraisParking = fraisParking;
    window.formatDateFr = formatDateFr;
    window.formatMonthFr = formatMonthFr;
  </script>

  <script type="module" src="parking.js"></script>
</body>
</html>
