<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion - Gestion des frais</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8fafc;
      padding: 20px;
    }
    .auth-card {
      width: 100%;
      max-width: 460px;
      background: #fff;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }
    .auth-card h1 {
      margin: 0 0 8px;
      font-size: 28px;
      text-align: center;
    }
    .auth-card p {
      margin: 0 0 22px;
      text-align: center;
      color: #64748b;
    }
    .auth-actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }
    .auth-link {
      margin-top: 16px;
      text-align: center;
      color: #475569;
    }
    .auth-link a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }
    .auth-error {
      margin-top: 12px;
      color: #b91c1c;
      font-size: 14px;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <h1>Connexion</h1>
      <p>Accès sécurisé à l’application</p>

      <div class="field">
        <label for="loginEmail">Adresse mail</label>
        <input type="email" id="loginEmail" placeholder="exemple@mail.fr" />
      </div>

      <div class="field">
        <label for="loginPassword">Mot de passe</label>
        <input type="password" id="loginPassword" placeholder="Votre mot de passe" />
      </div>

      <div class="auth-actions">
        <button class="btn btn-primary" type="button" id="btnLogin">Se connecter</button>
        <button class="btn btn-secondary" type="button" id="btnResetPassword">Mot de passe oublié</button>
      </div>

      <div id="loginError" class="auth-error"></div>

      <div class="auth-link">
        Pas encore de compte ? <a href="register.html">Créer un compte</a>
      </div>
    </div>
  </div>

  <script type="module" src="auth.js"></script>
  <script type="module">
    import {
      loginUser,
      sendResetPassword,
      redirectIfLoggedIn
    } from "./auth.js";

    redirectIfLoggedIn();

    const btnLogin = document.getElementById("btnLogin");
    const btnResetPassword = document.getElementById("btnResetPassword");
    const errorBox = document.getElementById("loginError");

    btnLogin.addEventListener("click", async () => {
      errorBox.textContent = "";

      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;

      try {
        await loginUser(email, password);
        window.location.href = "index.html";
      } catch (error) {
        errorBox.textContent = traduireErreurAuth(error);
      }
    });

    btnResetPassword.addEventListener("click", async () => {
      errorBox.textContent = "";

      const email = document.getElementById("loginEmail").value.trim();
      if (!email) {
        errorBox.textContent = "Saisis d'abord ton adresse mail.";
        return;
      }

      try {
        await sendResetPassword(email);
        errorBox.style.color = "#166534";
        errorBox.textContent = "Email de réinitialisation envoyé.";
      } catch (error) {
        errorBox.style.color = "#b91c1c";
        errorBox.textContent = traduireErreurAuth(error);
      }
    });

    function traduireErreurAuth(error) {
      const code = error?.code || "";
      if (code.includes("invalid-email")) return "Adresse mail invalide.";
      if (code.includes("missing-password")) return "Mot de passe manquant.";
      if (code.includes("invalid-credential")) return "Email ou mot de passe incorrect.";
      if (code.includes("user-not-found")) return "Compte introuvable.";
      if (code.includes("too-many-requests")) return "Trop d'essais. Réessaie plus tard.";
      return "Connexion impossible.";
    }
  </script>
</body>
</html>
