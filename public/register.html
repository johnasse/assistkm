<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Créer un compte - Gestion des frais</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8fafc;
      padding: 20px;
    }
    .auth-card {
      width: 100%;
      max-width: 460px;
      background: #fff;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }
    .auth-card h1 {
      margin: 0 0 8px;
      font-size: 28px;
      text-align: center;
    }
    .auth-card p {
      margin: 0 0 22px;
      text-align: center;
      color: #64748b;
    }
    .auth-actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }
    .auth-link {
      margin-top: 16px;
      text-align: center;
      color: #475569;
    }
    .auth-link a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }
    .auth-error {
      margin-top: 12px;
      color: #b91c1c;
      font-size: 14px;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <h1>Créer un compte</h1>
      <p>Créer un accès sécurisé</p>

      <div class="field">
        <label for="registerEmail">Adresse mail</label>
        <input type="email" id="registerEmail" placeholder="exemple@mail.fr" />
      </div>

      <div class="field">
        <label for="registerPassword">Mot de passe</label>
        <input type="password" id="registerPassword" placeholder="Minimum 6 caractères" />
      </div>

      <div class="field">
        <label for="registerPassword2">Confirmer le mot de passe</label>
        <input type="password" id="registerPassword2" placeholder="Confirmer le mot de passe" />
      </div>

      <div class="auth-actions">
        <button class="btn btn-success" type="button" id="btnRegister">Créer le compte</button>
      </div>

      <div id="registerError" class="auth-error"></div>

      <div class="auth-link">
        Déjà un compte ? <a href="login.html">Se connecter</a>
      </div>
    </div>
  </div>

  <script type="module" src="auth.js"></script>
  <script type="module">
    import {
      registerUser,
      redirectIfLoggedIn
    } from "./auth.js";

    redirectIfLoggedIn();

    const btnRegister = document.getElementById("btnRegister");
    const errorBox = document.getElementById("registerError");

    btnRegister.addEventListener("click", async () => {
      errorBox.textContent = "";

      const email = document.getElementById("registerEmail").value.trim();
      const password = document.getElementById("registerPassword").value;
      const password2 = document.getElementById("registerPassword2").value;

      if (password !== password2) {
        errorBox.textContent = "Les mots de passe ne correspondent pas.";
        return;
      }

      try {
        await registerUser(email, password);
        window.location.href = "index.html";
      } catch (error) {
        errorBox.textContent = traduireErreurAuth(error);
      }
    });

    function traduireErreurAuth(error) {
      const code = error?.code || "";
      if (code.includes("invalid-email")) return "Adresse mail invalide.";
      if (code.includes("email-already-in-use")) return "Cette adresse mail est déjà utilisée.";
      if (code.includes("weak-password")) return "Mot de passe trop faible.";
      return "Création du compte impossible.";
    }
  </script>
</body>
</html>
