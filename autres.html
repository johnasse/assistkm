<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Autres frais</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <div class="top-bar">
      <a href="index.html" class="back-link">← Accueil</a>
      <h1 class="page-title center-title">Autres frais</h1>
    </div>

    <section class="card">
      <h2>Informations générales</h2>

      <div class="grid grid-2">
        <div class="field">
          <label for="moisAutres">Mois</label>
          <input type="month" id="moisAutres" />
        </div>

        <div class="field">
          <label for="assistantNomAutres">Nom et prénom de l'assistant familial</label>
          <input type="text" id="assistantNomAutres" placeholder="Ex. David Martin" />
        </div>
      </div>
    </section>

    <section class="card">
      <h2>Ajouter une dépense</h2>

      <div class="grid grid-2">
        <div class="field">
          <label for="dateAutres">Date</label>
          <input type="date" id="dateAutres" />
        </div>

        <div class="field">
          <label for="enfantAutres">Nom de l’enfant</label>
          <input type="text" id="enfantAutres" placeholder="Ex. Rudy" />
        </div>

        <div class="field">
          <label for="typeAutres">Type de frais</label>
          <input type="text" id="typeAutres" placeholder="Ex. Pharmacie, vêtements, activité..." />
        </div>

        <div class="field">
          <label for="lieuAutres">Magasin / lieu</label>
          <input type="text" id="lieuAutres" placeholder="Ex. Leclerc, pharmacie, centre-ville..." />
        </div>

        <div class="field">
          <label for="objetAutres">Objet / description</label>
          <input type="text" id="objetAutres" placeholder="Ex. Chaussures, médicaments, goûter..." />
        </div>

        <div class="field">
          <label for="montantAutres">Montant (€)</label>
          <input type="number" id="montantAutres" step="0.01" min="0" placeholder="Ex. 18.50" />
        </div>

        <div class="field">
          <label for="justificatifAutres">Justificatif image</label>

          <input
            type="file"
            id="justificatifAutres"
            accept=".jpg,.jpeg,.png,image/*"
            capture="environment"
            style="display:none;"
          />

         <label for="justificatifAutres">Justificatif image</label>
            📷 Ajouter photo ou facture
          </label>

          <small id="nomJustificatifAutres" class="saved-msg"></small>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-success" type="button" id="btnAjouterAutres">Ajouter la dépense</button>
        <button class="btn btn-secondary" type="button" id="btnResetAutres">Réinitialiser</button>
      </div>
    </section>

    <section class="card">
      <h2>Liste des autres frais</h2>

      <div class="table-wrap">
        <table class="deplacements-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Enfant</th>
              <th>Type</th>
              <th>Magasin / lieu</th>
              <th>Objet</th>
              <th>Montant</th>
              <th>Justificatif</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="autresBody">
            <tr>
              <td colspan="8" class="empty-cell">Aucune dépense enregistrée</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="monthly-summary">
        <div class="summary-box">
          <span>Nombre de dépenses</span>
          <strong id="totalLignesAutres">0</strong>
        </div>
        <div class="summary-box">
          <span>Total du mois</span>
          <strong id="totalMontantAutres">0,00 €</strong>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-success" type="button" id="btnPdfAutres">Générer PDF mensuel</button>
        <button class="btn btn-danger" type="button" id="btnViderAutres">Vider la liste</button>
      </div>
    </section>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script type="module" src="autres.js"></script>
</body>
</html>
