<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Frais kilométriques - EasyFrais</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    input, select {
      padding: 8px;
      margin: 5px;
      width: 250px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-blue { background: #2d6cdf; color: white; }
    .btn-green { background: #27ae60; color: white; }
    .btn-red { background: #e74c3c; color: white; }
    .btn-grey { background: #bdc3c7; }

    #map {
      width: 100%;
      height: 300px;
      margin-top: 10px;
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: center;
    }

    th {
      background: #f0f0f0;
    }

    .stats {
      display: flex;
      gap: 20px;
      margin-top: 10px;
    }

    .stat-box {
      background: #eef2ff;
      padding: 10px;
      border-radius: 8px;
      width: 150px;
      text-align: center;
      font-weight: bold;
    }

    #toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #333;
      color: white;
      padding: 10px 20px;
      border-radius: 6px;
      display: none;
    }

    #toast.show {
      display: block;
    }
  </style>
</head>

<body>

<h1>Frais kilométriques</h1>

<div class="card">
  <h3>Informations</h3>

  <input type="text" id="assistantNom" placeholder="Nom assistant familial">
  <input type="month" id="moisEtat">

  <br>

  <input type="text" id="domicile" placeholder="Adresse domicile">
  <button id="btnSaveDomicile">Enregistrer domicile</button>
  <span id="domicileSaved"></span>

  <br>

  <label><input type="checkbox" id="departDomicile"> Départ domicile</label>
  <label><input type="checkbox" id="retourDomicile" checked> Retour domicile</label>

  <br>

  <input type="text" id="depart" placeholder="Adresse départ">

  <div id="destinations"></div>
  <button id="btnAddDestination">Ajouter une destination</button>
  <button id="btnUseServiceDestination">Utiliser l'adresse du service</button>

  <br><br>

  <input type="text" id="enfant" placeholder="Nom de l'enfant" list="childrenSuggestions">
  <datalist id="childrenSuggestions"></datalist>

  <input type="text" id="professionnel" placeholder="Professionnel">
  <input type="text" id="motif" placeholder="Motif">

  <br>

  <input type="date" id="dateTrajet">
  <input type="time" id="heureDebut">
  <input type="time" id="heureFin">

  <br>

  <select id="cv">
    <option value="3">3 CV</option>
    <option value="4">4 CV</option>
    <option value="5">5 CV</option>
    <option value="6">6 CV</option>
    <option value="7">7 CV</option>
  </select>

  <br><br>

  <button class="btn-blue" id="btnCalculer">Calculer le trajet</button>
  <button class="btn-green" id="btnAjouterDeplacement">Ajouter le déplacement</button>
  <button class="btn-grey" id="btnReset">Réinitialiser</button>

  <div class="stats">
    <div class="stat-box">
      Distance totale<br>
      <span id="distanceTotale">0 km</span>
    </div>

    <div class="stat-box">
      Temps estimé<br>
      <span id="tempsTotal">0 min</span>
    </div>

    <div class="stat-box">
      Montant estimé<br>
      <span id="montantTotal">0,00 €</span>
    </div>
  </div>

  <div id="map"></div>
</div>

<!-- BARÈMES -->
<div class="card">
  <h3>Barèmes kilométriques</h3>

  3 CV <input type="number" step="0.001" id="bareme3cv">
  4 CV <input type="number" step="0.001" id="bareme4cv">
  5 CV <input type="number" step="0.001" id="bareme5cv">
  6 CV <input type="number" step="0.001" id="bareme6cv">
  7 CV <input type="number" step="0.001" id="bareme7cv">

  <br>

  <button id="btnToggleBaremes">Modifier</button>
  <button id="btnSaveBaremes">Enregistrer</button>
  <button id="btnResetBaremes">Réinitialiser</button>
</div>

<div class="card">
  <h3>Déplacements enregistrés</h3>

  <button class="btn-blue" id="btnPdfMensuel">Générer le PDF mensuel</button>
  <button class="btn-red" id="btnViderListe">Vider la liste</button>

  <table>
    <thead>
      <tr>
        <th>Enfant</th>
        <th>Motif</th>
        <th>Date</th>
        <th>H. début</th>
        <th>H. fin</th>
        <th>Lieu départ</th>
        <th>Lieu RDV</th>
        <th>KM A/R</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="deplacementsBody">
      <tr id="emptyRow">
        <td colspan="9">Aucun déplacement</td>
      </tr>
    </tbody>
  </table>

  <div style="margin-top:10px;">
    Total mois :
    <span id="totalKmMois">0 km</span> |
    <span id="totalMontantMois">0 €</span>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script type="module" src="script.js"></script>

<script
  async
  defer
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDBFbvVJkqXFdK8Tdd8Py0smXXGgc1bkh0&libraries=places&callback=initMap">
</script>

</body>
</html>
